<html lang="he" dir="rtl">
<head><meta charset="utf-8"><title>טניס שולחן - העמותה לספורט</title><link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="skin/sport5_mockup.css"><style>.sport-detail-header{background:linear-gradient(135deg,#3ac41e 0%,#024616 100%);color:#fff;padding:40px 0;text-align:center;margin:24px 0 30px;border-radius:12px}.sport-detail-header h1{margin:0;font-size:36px;font-weight:700}.tabs-nav{display:flex;margin-bottom:30px;background:#fff;border-radius:12px;overflow:hidden}.tabs-nav button{flex:1;padding:16px;border:none;background:#f8f9fa;font-weight:600;font-size:15px;cursor:pointer;border-bottom:3px solid transparent}.tabs-nav button.active{background:#fff;color:#0b66ff;border-bottom-color:#0b66ff}.tab-content{display:none;background:#fff;padding:30px;border-radius:12px}.tab-content.active{display:block}.year-selector{margin-bottom:30px}.year-selector select{padding:10px;border:1px solid #e0e0e0;border-radius:6px}.results-item{display:flex;justify-content:space-between;padding:16px;margin-bottom:12px;background:#f8f9fa;border-radius:8px;border-right:4px solid #0b66ff}.results-item .score{font-size:20px;font-weight:700;color:#0b66ff}.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px}.gallery-item{aspect-ratio:1;overflow:hidden;border-radius:8px}.gallery-item img{width:100%;height:100%;object-fit:cover}.back-link{margin-bottom:20px;color:#0b66ff;text-decoration:none;font-weight:600;display:inline-block}</style></head>
