<!doctype html>
<html lang="he" dir="rtl"><head><meta charset="utf-8"><title>סנוקר - העמותה לספורט</title><link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="skin/sport5_mockup.css"><style>.sport-detail-header{background:linear-gradient(135deg,#3ac41e 0%,#024616 100%);color:#fff;padding:40px 0;text-align:center;margin:24px 0 30px;border-radius:12px}.sport-detail-header h1{margin:0;font-size:32px}.tabs-nav{display:flex;margin-bottom:30px;background:#fff;border-radius:12px}.tabs-nav button{flex:1;padding:12px;border:none;background:#f8f9fa;font-weight:600;cursor:pointer;border-bottom:3px solid transparent}.tabs-nav button.active{background:#fff;color:#0b66ff;border-bottom-color:#0b66ff}.tab-content{display:none;background:#fff;padding:20px;border-radius:12px}.tab-content.active{display:block}.results-item{padding:12px;margin-bottom:10px;background:#f8f9fa;border-right:4px solid #0b66ff;display:flex;justify-content:space-between}.back-link{color:#0b66ff;text-decoration:none;display:inline-block;margin-bottom:20px}</style></head><body><header class="mock-header"><div class="container header-inner"><img src="skin/design/logo.png" alt="לוגו" class="logo" style="height:40px"></div></header><main class="container"><a href="index.html" class="back-link">← חזרה</a><div class="sport-detail-header"><h1>סנוקר</h1></div><div class="tabs-nav"><button class="tab-button active" data-tab="results">תוצאות</button><button class="tab-button" data-tab="gallery">גלריה</button><button class="tab-button" data-tab="regulations">תקנון</button></div><div id="results" class="tab-content active"><select style="margin-bottom:20px"><option>2026</option><option>2025</option><option>2024</option></select><div class="results-item"><div><strong>טורניר סנוקר חיפה</strong></div><div>142:138</div></div></div><div id="gallery" class="tab-content"><img src="https://images.unsplash.com/photo-1554118811-1e0d58224e24?w=200&h=200&fit=crop" alt="תמונה" style="max-width:200px;border-radius:8px"></div><div id="regulations" class="tab-content"><p>כללי סנוקר מקצועיים</p></div></main><script>document.querySelectorAll('.tab-button').forEach(b=>{b.addEventListener('click',function(){[...document.querySelectorAll('.tab-button')].forEach(x=>x.classList.remove('active'));[...document.querySelectorAll('.tab-content')].forEach(x=>x.classList.remove('active'));this.classList.add('active');document.getElementById(this.dataset.tab).classList.add('active')})});</script></body></html>
