<!doctype html>

utton')].forEach(x=>x.classList.remove('active'));[...document.querySelectorAll('.tab-content')].forEach(x=>x.classList.remove('active'));this.classList.add('active');document.getElementById(this.dataset.tab).classList.add('active')})});</script></body></html>
